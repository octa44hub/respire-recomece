<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2C4A32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Respire">
  <title>Respire e Recomece</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep:  #1E3325;
      --green-dark:  #2C4A32;
      --green-mid:   #3D6B48;
      --cream:       #F7F3ED;
      --cream-dark:  #EDE8DF;
      --gold:        #C9A96E;
      --gold-light:  #E8D5A3;
      --gold-pale:   #F5EDD8;
      --text-dark:   #1A1A1A;
      --text-mid:    #4A4A4A;
      --text-light:  #8A8A8A;
      --radius:      16px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #1E3325;
      font-family: 'Jost', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ── */
    #app {
      position: relative;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      overflow: hidden;
      background: var(--cream);
    }

    /* ── SCREENS ──
       Cada screen ocupa todo o app.
       O scroll acontece no .screen (overflow-y: auto).
       O conteúdo que precisa de flex-centering usa um wrapper interno.
    */
    .screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--cream);
    }
    .screen.hidden { display: none; }
    ::-webkit-scrollbar { display: none; }

    /* ── ACCESS SCREEN ── */
    #screen-access {
      background: linear-gradient(155deg, #1E3325 0%, #2C4A32 50%, #3D6B48 100%);
    }

    /* Wrapper interno resolve o bug de flex+overflow+justify-content */
    .access-wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 28px 72px;
    }

    .access-logo {
      text-align: center;
      margin-bottom: 44px;
    }
    .access-logo .brand {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 300;
      letter-spacing: 6px;
      color: #F7F3ED;
      line-height: 1.1;
    }
    .access-logo .sep {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 6px;
      color: #C9A96E;
      margin: 6px 0;
    }
    .access-logo .tagline {
      display: block;
      font-size: 10px;
      letter-spacing: 3.5px;
      color: rgba(247,243,237,.45);
      margin-top: 14px;
    }

    .access-ornament {
      font-size: 18px;
      color: #C9A96E;
      opacity: .55;
      margin-bottom: 36px;
    }

    .access-card {
      width: 100%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 32px 24px 28px;
    }

    .access-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: #F7F3ED;
      text-align: center;
      margin-bottom: 8px;
    }
    .access-card .subtitle {
      font-size: 12px;
      color: rgba(247,243,237,.5);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .token-input {
      display: block;
      width: 100%;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      padding: 16px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #F7F3ED;
      letter-spacing: 4px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    .token-input::placeholder { color: rgba(247,243,237,.25); letter-spacing: 2px; font-size: 13px; }
    .token-input:focus { border-color: #C9A96E; }

    .btn-access {
      display: block;
      width: 100%;
      background: #C9A96E;
      color: #2C4A32;
      border: none;
      border-radius: 13px;
      padding: 17px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-access:active { opacity: .85; transform: scale(.98); }
    .btn-access:disabled { opacity: .6; cursor: default; }

    .access-error {
      display: none;
      color: #FFB3B3;
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
    }
    .demo-hint {
      font-size: 11px;
      color: rgba(247,243,237,.3);
      text-align: center;
      margin-top: 14px;
      letter-spacing: .5px;
    }
    .demo-hint b { color: rgba(201,169,110,.65); font-weight: 500; }

    /* ── SHARED BUTTONS ── */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--gold);
      color: var(--green-dark);
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:active { opacity: .88; transform: scale(.98); }

    .btn-outline {
      display: block;
      width: 100%;
      background: transparent;
      color: var(--green-dark);
      border: 1.5px solid var(--green-dark);
      border-radius: 14px;
      padding: 15px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background .2s;
    }
    .btn-outline:active { background: rgba(44,74,50,.06); }

    .back-btn {
      position: absolute;
      top: 52px; left: 18px;
      background: rgba(255,255,255,.12);
      border: none;
      border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--cream);
      font-size: 20px;
      z-index: 10;
    }

    /* ── HOME SCREEN ── */
    #screen-home { padding-bottom: 88px; }

    .home-header {
      background: var(--green-dark);
      padding: 52px 22px 24px;
    }
    .home-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .home-greeting {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.2;
    }
    .home-greeting span { color: var(--gold); }
    .streak-badge {
      background: rgba(201,169,110,.15);
      border: 1px solid rgba(201,169,110,.3);
      border-radius: 10px;
      padding: 6px 12px;
      text-align: center;
    }
    .streak-badge .num {
      display: block;
      font-size: 20px;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .streak-badge .lbl {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(201,169,110,.7);
    }

    .progress-bar-wrap {
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      height: 6px;
      margin-bottom: 6px;
    }
    .progress-bar-fill {
      background: var(--gold);
      height: 6px;
      border-radius: 8px;
      transition: width .4s ease;
    }
    .progress-label {
      font-size: 11px;
      color: rgba(247,243,237,.55);
      letter-spacing: .5px;
    }

    .home-body { padding: 20px 16px; }

    /* Phase sections */
    .phase-section { margin-bottom: 24px; }
    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--cream-dark);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .phase-emoji { font-size: 16px; }
    .phase-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--green-dark);
      text-transform: uppercase;
    }
    .phase-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-left: auto;
    }

    .day-card {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 2px 10px rgba(44,74,50,.06);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border: 1.5px solid transparent;
    }
    .day-card:active { transform: scale(.985); }
    .day-card.done { border-color: rgba(201,169,110,.35); background: #fffdf8; }
    .day-card.locked { opacity: .45; cursor: default; }
    .day-card.active-day { border-color: var(--green-mid); }

    .day-num {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      color: var(--text-mid);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .day-card.done .day-num { background: var(--gold-pale); color: var(--green-dark); }
    .day-card.active-day .day-num { background: var(--green-dark); color: var(--cream); }

    .day-info { flex: 1; min-width: 0; }
    .day-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-check {
      font-size: 16px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    /* ── DAY SCREEN ── */
    #screen-day { padding-bottom: 100px; }

    .day-hero {
      padding: 52px 22px 32px;
      position: relative;
    }
    .day-hero.p1 { background: linear-gradient(150deg, #1E3325 0%, #2C4A32 100%); }
    .day-hero.p2 { background: linear-gradient(150deg, #2C3A4A 0%, #3A5A6A 100%); }
    .day-hero.p3 { background: linear-gradient(150deg, #3A2C1E 0%, #6B5A3D 100%); }

    .day-hero-phase {
      font-size: 10px;
      letter-spacing: 2.5px;
      color: rgba(201,169,110,.7);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .day-hero-num {
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(247,243,237,.4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .day-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .day-hero-divider {
      width: 40px;
      height: 1px;
      background: rgba(201,169,110,.5);
      margin-bottom: 16px;
    }
    .day-hero-proposito {
      font-size: 13px;
      color: rgba(247,243,237,.7);
      line-height: 1.65;
    }

    .day-body { padding: 20px 18px; }

    .day-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(44,74,50,.06);
    }
    .day-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--green-mid);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .day-section-text {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.75;
      white-space: pre-line;
    }
    .day-example {
      background: var(--gold-pale);
      border-left: 3px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.65;
      font-style: italic;
      margin-top: 4px;
    }

    .day-actions {
      padding: 0 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── PLANNER ── */
    #screen-planner { padding-bottom: 100px; }

    .planner-hero {
      padding: 52px 22px 28px;
      background: linear-gradient(150deg, #1E3325 0%, #2C4A32 100%);
      position: relative;
    }
    .planner-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .planner-hero-sub {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(247,243,237,.5);
      text-transform: uppercase;
    }
    .saved-badge {
      position: absolute;
      top: 16px; right: 18px;
      background: var(--green-mid);
      color: var(--cream);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transition: opacity .3s;
    }
    .saved-badge.show { opacity: 1; }

    .planner-body { padding: 16px; }

    .pcard {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(44,74,50,.06);
    }
    .pcard-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 12px;
    }

    .emotion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .emo-btn {
      background: var(--cream-dark);
      border: 1.5px solid transparent;
      border-radius: 20px;
      padding: 7px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .emo-btn.sel {
      background: var(--gold-pale);
      border-color: var(--gold);
      color: var(--green-dark);
    }

    .pinput {
      display: block;
      width: 100%;
      background: var(--cream);
      border: 1px solid var(--cream-dark);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: var(--text-dark);
      outline: none;
      resize: none;
      transition: border-color .2s;
    }
    .pinput:focus { border-color: var(--green-mid); }

    .priority-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .pnum {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--green-dark);
      color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }

    .refl-q { margin-bottom: 14px; }
    .refl-label {
      display: block;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .save-cta {
      padding: 4px 16px 24px;
    }

    /* ── COMPLETE SCREEN ── */
    #screen-complete {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(155deg, #1E3325 0%, #2C4A32 60%, #3D6B48 100%);
      padding: 60px 28px;
    }
    /* complete screen não precisa do wrapper pattern pois não usa overflow-y: auto */

    .complete-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      color: var(--gold);
      margin-bottom: 28px;
    }
    .complete-day-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(201,169,110,.7);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .complete-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .complete-quote {
      font-size: 14px;
      color: rgba(247,243,237,.6);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 16px;
      max-width: 320px;
    }
    .complete-next {
      font-size: 13px;
      color: rgba(247,243,237,.4);
      margin-bottom: 36px;
    }
    .complete-btn {
      background: var(--gold);
      color: var(--green-dark);
      border: none;
      border-radius: 14px;
      padding: 17px 40px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green-dark);
      color: var(--cream);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- TELA DE ACESSO -->
  <div id="screen-access" class="screen">
    <div class="access-wrap">
      <div class="access-logo">
        <span class="brand">RESPIRE</span>
        <span class="sep">— e —</span>
        <span class="brand">RECOMECE</span>
        <span class="tagline">21 DIAS · CLAREZA · PROSPERIDADE</span>
      </div>
      <div class="access-ornament">✦</div>
      <div class="access-card">
        <h2>Bem-vinda de volta</h2>
        <p class="subtitle">Digite o código de acesso<br>enviado após sua compra</p>
        <input class="token-input" id="tokenInput" type="text"
          placeholder="Seu código" maxlength="12"
          autocomplete="off" spellcheck="false">
        <button class="btn-access" onclick="handleAccess()">ACESSAR MINHA JORNADA</button>
        <p class="access-error" id="accessError">Código inválido. Verifique e tente novamente.</p>
        <p class="demo-hint">Protótipo · use o código <b>RESPIRE</b></p>
      </div>
    </div>
  </div>

  <!-- TELA HOME (gerada por JS) -->
  <div id="screen-home" class="screen hidden"></div>

  <!-- TELA DIA (gerada por JS) -->
  <div id="screen-day" class="screen hidden"></div>

  <!-- TELA PLANNER (gerada por JS) -->
  <div id="screen-planner" class="screen hidden"></div>

  <!-- TELA CONCLUSÃO (gerada por JS) -->
  <div id="screen-complete" class="screen hidden"></div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════
   DADOS — 21 DIAS
═══════════════════════════ */
const PHASES = [
  { id:1, label:'SEMANA 1', name:'O Detox Mental',         sub:'Limpando o Terreno',     emoji:'🌱', color:'p1' },
  { id:2, label:'SEMANA 2', name:'Reprogramação Mental',   sub:'Assumindo o Comando',    emoji:'⚡', color:'p2' },
  { id:3, label:'SEMANA 3', name:'Domínio e Prosperidade', sub:'Consolidando a Blindagem',emoji:'✨', color:'p3' }
];

const DAYS = [
  // SEMANA 1
  { id:1,  semana:1, titulo:'Pausa Consciente',
    proposito:'Interromper o fluxo de reatividade e desligar o modo de sobrevivência do cérebro.',
    exemplo:'Você está em meio a e-mails urgentes e sente a respiração encurtar. Em vez de continuar, você para.',
    acao:'Escolha 3 momentos do dia para parar 1 minuto.\n\nRespire. Feche os olhos. Ouça seu corpo.\n\nPode ser antes do café, no banheiro ou no carro.',
    planner:'Registre seu estado emocional antes e depois da pausa.',
    quote:'A pausa é onde a clareza nasce.' },

  { id:2,  semana:1, titulo:'Mapa da Mente',
    proposito:'Identificar os padrões de pensamento que drenam sua energia e produtividade.',
    exemplo:'Você percebe que fica ruminando sobre o mesmo problema às 14h todos os dias.',
    acao:'Pegue um papel e escreva sem filtro por 10 minutos.\n\nTudo que está na sua cabeça: medos, listas, preocupações.\n\nDepois, circule o que está em seu controle.',
    planner:'O que você descobriu sobre seus padrões de pensamento?',
    quote:'Nomear o medo é o primeiro passo para dissolvê-lo.' },

  { id:3,  semana:1, titulo:'Âncora do Presente',

const DEFAULT = {
  token: null, currentDay: 1, completedDays: [],
  streak: 0, lastOpened: null, startDate: null, plannerEntries: {}
};
let S = { ...DEFAULT };
let activeDay = null;

function save() { localStorage.setItem('rr_v2', JSON.stringify(S)); }
function load() {
  const raw = localStorage.getItem('rr_v2');
  if (raw) { S = { ...DEFAULT, ...JSON.parse(raw) }; return true; }
  return false;
}
function updateStreak() {
  const today = new Date().toDateString();
  if (S.lastOpened === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  S.streak = S.lastOpened === yesterday ? (S.streak || 0) + 1 : (S.lastOpened ? 1 : (S.streak || 1));
  S.lastOpened = today;
  save();
}

═══════════════════════════ */
const SCREENS = ['access','home','day','planner','complete'];
function show(id) {
  SCREENS.forEach(s => {
    const el = document.getElementById('screen-' + s);
    if (el) {
      if (s === id) el.classList.remove('hidden');
      else el.classList.add('hidden');
      el.scrollTop = 0;
    }
  });
}

   TOAST
═══════════════════════════ */
let _tTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ═══════════════════════════
   ACCESS
═══════════════════════════ */
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAccess();
});

async function handleAccess() {
  const val = document.getElementById('tokenInput').value.trim().toUpperCase();
  const err = document.getElementById('accessError');
  const btn = document.querySelector('.btn-access');

  if (val.length < 6) {
    err.style.display = 'block';
    err.textContent = 'Código precisa ter ao menos 6 caracteres.';
    return;
  }

  btn.textContent = 'VERIFICANDO...';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const res = await fetch('/api/validate-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: val })
    });
    const data = await res.json();

    if (data.valid) {
      S.token = val;
      if (!S.startDate) S.startDate = new Date().toISOString();
      updateStreak();
      save();
      renderHome();
      show('home');
    } else {
      err.textContent = 'Código inválido. Verifique e tente novamente.';
      err.style.display = 'block';
      btn.textContent = 'ACESSAR MINHA JORNADA';
      btn.disabled = false;
    }
  } catch (e) {
    err.textContent = 'Erro de conexão. Tente novamente.';
    err.style.display = 'block';
    btn.textContent = 'ACESSAR MINHA JORNADA';
    btn.disabled = false;
  }
}

═══════════════════════════ */
function renderHome() {
  const done = S.completedDays.length;
  const pct  = Math.round((done / 21) * 100);
  const el   = document.getElementById('screen-home');

  const phasesHTML = PHASES.map(ph => {
    const days = DAYS.filter(d => d.semana === ph.id);
    const daysHTML = days.map(d => {
      const isDone   = S.completedDays.includes(d.id);
      const isActive = d.id === S.currentDay;
      const isLocked = d.id > S.currentDay && !isDone;
      let cls = 'day-card';
      if (isDone)   cls += ' done';
      if (isActive) cls += ' active-day';
      if (isLocked) cls += ' locked';
      const onclick = isLocked ? '' : `onclick="openDay(${d.id})"`;
      return `
        <div class="${cls}" ${onclick}>
          <div class="day-num">${isDone ? '✓' : d.id}</div>
          <div class="day-info">
            <div class="day-title">${d.titulo}</div>
            <div class="day-sub">${d.proposito.substring(0,55)}…</div>
          </div>
          <div class="day-check">${isDone ? '🌿' : isActive ? '▶' : isLocked ? '🔒' : ''}</div>
        </div>`;
    }).join('');

    return `
      <div class="phase-section">
        <div class="phase-header">
          <span class="phase-emoji">${ph.emoji}</span>
          <span class="phase-name">${ph.label} · ${ph.name}</span>
          <span class="phase-sub">${ph.sub}</span>
        </div>
        ${daysHTML}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="home-header">
      <div class="home-header-top">
        <div class="home-greeting">Sua jornada<br><span>de 21 dias</span></div>
        <div class="streak-badge">
          <span class="num">${S.streak || 1}</span>
          <span class="lbl">DIA${S.streak !== 1 ? 'S' : ''}</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${done} de 21 dias completos · ${pct}%</div>
    </div>
    <div class="home-body">${phasesHTML}</div>
  `;
}

  autosave();
}

let _asTimer;
function autosave() {
  clearTimeout(_asTimer);
  _asTimer = setTimeout(savePlanner, 800);
}

function savePlanner() {
  if (!activeDay) return;
  const id = activeDay.id;
  S.plannerEntries[id] = {
    emocao:       _emoSel || (S.plannerEntries[id]||{}).emocao,
    emocaoCustom: document.getElementById('pEmoCustom')?.value  || '',
    intencao:     document.getElementById('pIntencao')?.value   || '',
    prio1:        document.getElementById('pPrio1')?.value      || '',

    prio3:        document.getElementById('pPrio3')?.value      || '',

    refl2:        document.getElementById('pRefl2')?.value      || '',
    refl3:        document.getElementById('pRefl3')?.value      || '',
    daySpec:      document.getElementById('pDaySpec')?.value    || '',
    savedAt:      new Date().toISOString()
  };
  save();
  const badge = document.getElementById('savedBadge');
  if (badge) { badge.classList.add('show'); setTimeout(()=>badge.classList.remove('show'),2000); }
}

function completeDay(id) {
  if (!S.completedDays.includes(id)) S.completedDays.push(id);
  if (id >= S.currentDay) S.currentDay = Math.min(id + 1, 21);
  updateStreak();
  save();

  const d = DAYS.find(x => x.id === id);
  const isLast = id === 21;
  const el = document.getElementById('screen-complete');

  el.innerHTML = `
    <div class="complete-ring">✦</div>
    <div class="complete-day-label">DIA ${id} CONCLUÍDO</div>
    <div class="complete-title">${isLast ? 'Jornada<br>Completa' : `Dia ${id}<br>Concluído`}</div>
    <p class="complete-quote">"${d.quote}"</p>
    <p class="complete-next">${isLast ? '21 dias de clareza. Você chegou.' : `Dia ${id+1} te espera amanhã 🌿`}</p>
    <button class="complete-btn" onclick="afterComplete()">
      ${isLast ? 'VER MINHA JORNADA' : 'VOLTAR AO INÍCIO'}
    </button>
  `;
  show('complete');
}

function afterComplete() {
  renderHome();
  show('home');
}

/* ═══════════════════════════
   BOOT
═══════════════════════════ */
function boot() {
  if (load() && S.token) {
    updateStreak();
    renderHome();
    show('home');
  } else {
    show('access');
    document.getElementById('tokenInput').focus();
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
</body>
</html>
