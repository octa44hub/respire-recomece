<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2C4A32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Respire e Recomece</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; }
    body { height:100%; font-family:'Jost',sans-serif; background:#1E3325; -webkit-font-smoothing:antialiased; }

    /* ── VARIÁVEIS ── */
    :root {
      --green-deep:#1E3325; --green-dark:#2C4A32; --green-mid:#3D6B48;
      --cream:#F7F3ED; --cream-dark:#EDE8DF;
      --gold:#C9A96E; --gold-light:#E8D5A3; --gold-pale:#F5EDD8;
      --text:#1A1A1A; --text-mid:#4A4A4A; --text-light:#8A8A8A;
    }

    /* ── APP WRAPPER ──
       Ocupa 100% da tela, centraliza o conteúdo em telas largas.
       Screens são empilhadas por display:none / display:block.
    */
    #app {
      width:100%;
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      position:relative;
      background:var(--cream);
    }

    /* ── SCREENS ──
       Fluxo normal — sem position:absolute.
       Apenas a screen ativa fica visível.
    */
    .screen { display:none; width:100%; }
    .screen.active { display:block; }

    /* ══════════════════════════════
       TELA DE ACESSO
    ══════════════════════════════ */
    #screen-access {
      min-height:100vh;
      background:linear-gradient(160deg, #1E3325 0%, #2C4A32 55%, #3D6B48 100%);
      display:flex !important;         /* override display:none quando active */
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:64px 28px 80px;
      text-align:center;
    }
    /* Atenção: quando hidden, voltamos para display:none */
    #screen-access.hidden-screen { display:none !important; }

    .access-logo { margin-bottom:40px; }
    .access-logo .brand {
      display:block;
      font-family:'Cormorant Garamond',serif;
      font-size:48px;
      font-weight:300;
      letter-spacing:7px;
      color:#F7F3ED;
      line-height:1.1;
    }
    .access-logo .sep {
      display:block;
      font-family:'Cormorant Garamond',serif;
      font-size:15px;
      letter-spacing:6px;
      color:#C9A96E;
      margin:8px 0;
    }
    .access-logo .tagline {
      display:block;
      font-size:10px;
      letter-spacing:3px;
      color:rgba(247,243,237,.4);
      margin-top:12px;
    }

    .access-ornament { font-size:18px; color:#C9A96E; opacity:.5; margin-bottom:32px; }

    .access-card {
      width:100%;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.14);
      border-radius:20px;
      padding:28px 22px 24px;
    }
    .access-card h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:22px;
      font-weight:400;
      color:#F7F3ED;
      margin-bottom:8px;
    }
    .access-card .sub {
      font-size:12px;
      color:rgba(247,243,237,.45);
      line-height:1.65;
      margin-bottom:22px;
    }
    .token-input {
      width:100%;
      display:block;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.2);
      border-radius:11px;
      padding:15px 18px;
      font-size:18px;
      font-weight:500;
      font-family:'Jost',sans-serif;
      color:#F7F3ED;
      letter-spacing:4px;
      text-align:center;
      text-transform:uppercase;
      outline:none;
      margin-bottom:12px;
    }
    .token-input::placeholder { color:rgba(247,243,237,.22); letter-spacing:2px; font-size:13px; }
    .token-input:focus { border-color:#C9A96E; }

    .btn-access {
      width:100%;
      display:block;
      background:#C9A96E;
      color:#2C4A32;
      border:none;
      border-radius:12px;
      padding:16px;
      font-family:'Jost',sans-serif;
      font-size:13px;
      font-weight:600;
      letter-spacing:2px;
      text-transform:uppercase;
      cursor:pointer;
    }
    .btn-access:disabled { opacity:.6; }

    .access-error {
      display:none;
      color:#FFB3B3;
      font-size:12px;
      margin-top:10px;
    }
    .demo-hint { font-size:11px; color:rgba(247,243,237,.28); margin-top:12px; }
    .demo-hint b { color:rgba(201,169,110,.6); font-weight:500; }

    /* ══════════════════════════════
       SHARED
    ══════════════════════════════ */
    .btn-primary {
      display:block; width:100%;
      background:var(--gold); color:var(--green-dark);
      border:none; border-radius:13px; padding:16px;
      font-family:'Jost',sans-serif; font-size:13px;
      font-weight:600; letter-spacing:1.8px; text-transform:uppercase;
      cursor:pointer;
    }
    .btn-outline {
      display:block; width:100%;
      background:transparent; color:var(--green-dark);
      border:1.5px solid var(--green-dark); border-radius:13px; padding:14px;
      font-family:'Jost',sans-serif; font-size:13px;
      font-weight:500; letter-spacing:1px; cursor:pointer; margin-bottom:10px;
    }
    .back-btn {
      position:absolute; top:52px; left:18px;
      background:rgba(255,255,255,.12); border:none; border-radius:10px;
      width:38px; height:38px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--cream); font-size:20px; z-index:10;
    }

    /* ══════════════════════════════
       HOME
    ══════════════════════════════ */
    #screen-home { padding-bottom:80px; }

    .home-header { background:var(--green-dark); padding:52px 20px 22px; }
    .home-header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .home-greeting { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300; color:var(--cream); line-height:1.2; }
    .home-greeting span { color:var(--gold); }
    .streak-badge { background:rgba(201,169,110,.14); border:1px solid rgba(201,169,110,.28); border-radius:10px; padding:6px 12px; text-align:center; }
    .streak-badge .num { display:block; font-size:20px; font-weight:600; color:var(--gold); line-height:1; }
    .streak-badge .lbl { font-size:9px; letter-spacing:1.5px; color:rgba(201,169,110,.65); }
    .progress-bar-wrap { background:rgba(255,255,255,.1); border-radius:8px; height:5px; margin-bottom:6px; }
    .progress-bar-fill { background:var(--gold); height:5px; border-radius:8px; }
    .progress-label { font-size:11px; color:rgba(247,243,237,.5); letter-spacing:.5px; }

    .home-body { padding:18px 14px; }
    .phase-section { margin-bottom:22px; }
    .phase-header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--cream-dark); border-radius:12px; margin-bottom:10px; }
    .phase-emoji { font-size:16px; }
    .phase-name { font-size:11px; font-weight:600; letter-spacing:1.5px; color:var(--green-dark); text-transform:uppercase; }
    .phase-sub { font-size:11px; color:var(--text-light); margin-left:auto; }

    .day-card { display:flex; align-items:center; background:#fff; border-radius:13px; padding:13px 15px; margin-bottom:8px; box-shadow:0 2px 8px rgba(44,74,50,.06); cursor:pointer; border:1.5px solid transparent; }
    .day-card.done { border-color:rgba(201,169,110,.3); background:#fffdf8; }
    .day-card.locked { opacity:.42; cursor:default; }
    .day-card.active-day { border-color:var(--green-mid); }
    .day-num { width:34px; height:34px; border-radius:50%; background:var(--cream-dark); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--text-mid); margin-right:12px; flex-shrink:0; }
    .day-card.done .day-num { background:var(--gold-pale); color:var(--green-dark); }
    .day-card.active-day .day-num { background:var(--green-dark); color:var(--cream); }
    .day-info { flex:1; min-width:0; }
    .day-title { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-sub { font-size:11px; color:var(--text-light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-check { font-size:16px; margin-left:8px; flex-shrink:0; }

    /* ══════════════════════════════
       DIA
    ══════════════════════════════ */
    #screen-day { padding-bottom:100px; }
    .day-hero { padding:52px 20px 30px; position:relative; }
    .day-hero.p1 { background:linear-gradient(150deg,#1E3325,#2C4A32); }
    .day-hero.p2 { background:linear-gradient(150deg,#2C3A4A,#3A5A6A); }
    .day-hero.p3 { background:linear-gradient(150deg,#3A2C1E,#6B5A3D); }
    .day-hero-phase { font-size:10px; letter-spacing:2px; color:rgba(201,169,110,.65); text-transform:uppercase; margin-bottom:10px; }
    .day-hero-num { font-size:11px; letter-spacing:2px; color:rgba(247,243,237,.38); text-transform:uppercase; margin-bottom:5px; }
    .day-hero-title { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; color:var(--cream); line-height:1.15; margin-bottom:18px; }
    .day-hero-divider { width:36px; height:1px; background:rgba(201,169,110,.45); margin-bottom:14px; }
    .day-hero-proposito { font-size:13px; color:rgba(247,243,237,.65); line-height:1.7; }
    .day-body { padding:18px 16px; }
    .day-section { background:#fff; border-radius:15px; padding:18px; margin-bottom:12px; box-shadow:0 2px 8px rgba(44,74,50,.06); }
    .day-section-label { font-size:10px; font-weight:600; letter-spacing:2px; color:var(--green-mid); text-transform:uppercase; margin-bottom:10px; }
    .day-section-text { font-size:14px; color:var(--text-mid); line-height:1.75; white-space:pre-line; }
    .day-example { background:var(--gold-pale); border-left:3px solid var(--gold); border-radius:0 10px 10px 0; padding:13px 15px; font-size:13px; color:var(--text-mid); line-height:1.65; font-style:italic; }
    .day-actions { padding:0 16px 20px; display:flex; flex-direction:column; gap:10px; }

    /* ══════════════════════════════
       PLANNER
    ══════════════════════════════ */
    #screen-planner { padding-bottom:100px; }
    .planner-hero { padding:52px 20px 26px; background:linear-gradient(150deg,#1E3325,#2C4A32); position:relative; }
    .planner-hero-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; color:var(--cream); margin-bottom:4px; }
    .planner-hero-sub { font-size:10px; letter-spacing:1.5px; color:rgba(247,243,237,.45); text-transform:uppercase; }
    .saved-badge { position:absolute; top:16px; right:18px; background:var(--green-mid); color:var(--cream); border-radius:20px; padding:4px 12px; font-size:11px; opacity:0; transition:opacity .3s; }
    .saved-badge.show { opacity:1; }
    .planner-body { padding:14px; }
    .pcard { background:#fff; border-radius:15px; padding:16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(44,74,50,.06); }
    .pcard-title { font-size:13px; font-weight:600; color:var(--green-dark); margin-bottom:10px; }
    .emotion-grid { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:8px; }
    .emo-btn { background:var(--cream-dark); border:1.5px solid transparent; border-radius:20px; padding:6px 13px; font-family:'Jost',sans-serif; font-size:12px; cursor:pointer; }
    .emo-btn.sel { background:var(--gold-pale); border-color:var(--gold); }
    .pinput { display:block; width:100%; background:var(--cream); border:1px solid var(--cream-dark); border-radius:9px; padding:11px 13px; font-family:'Jost',sans-serif; font-size:13px; color:var(--text); outline:none; resize:none; }
    .pinput:focus { border-color:var(--green-mid); }
    .priority-row { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
    .pnum { width:24px; height:24px; border-radius:50%; background:var(--green-dark); color:var(--cream); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
    .refl-q { margin-bottom:12px; }
    .refl-label { display:block; font-size:11px; color:var(--text-light); margin-bottom:5px; }
    .save-cta { padding:4px 14px 20px; }

    /* ══════════════════════════════
       CONCLUSÃO
    ══════════════════════════════ */
    #screen-complete {
      min-height:100vh;
      background:linear-gradient(160deg,#1E3325 0%,#2C4A32 60%,#3D6B48 100%);
      display:flex !important;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:60px 28px;
    }
    #screen-complete.hidden-screen { display:none !important; }
    .complete-ring { width:90px; height:90px; border-radius:50%; border:1px solid rgba(201,169,110,.4); display:flex; align-items:center; justify-content:center; font-size:32px; color:var(--gold); margin-bottom:24px; }
    .complete-day-label { font-size:10px; letter-spacing:3px; color:rgba(201,169,110,.65); text-transform:uppercase; margin-bottom:10px; }
    .complete-title { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:300; color:var(--cream); line-height:1.15; margin-bottom:18px; }
    .complete-quote { font-size:13px; color:rgba(247,243,237,.55); line-height:1.7; font-style:italic; margin-bottom:14px; max-width:300px; }
    .complete-next { font-size:12px; color:rgba(247,243,237,.38); margin-bottom:32px; }
    .complete-btn { background:var(--gold); color:var(--green-dark); border:none; border-radius:13px; padding:16px 36px; font-family:'Jost',sans-serif; font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }

    /* ══════════════════════════════
       TOAST
    ══════════════════════════════ */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--green-dark); color:var(--cream); padding:11px 22px; border-radius:30px; font-size:13px; opacity:0; transition:all .3s; pointer-events:none; z-index:999; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── ACESSO ── -->
  <div id="screen-access" class="screen active">
    <div class="access-logo">
      <span class="brand">RESPIRE</span>
      <span class="sep">— e —</span>
      <span class="brand">RECOMECE</span>
      <span class="tagline">21 DIAS · CLAREZA · PROSPERIDADE</span>
    </div>
    <div class="access-ornament">✦</div>
    <div class="access-card">
      <h2>Bem-vinda de volta</h2>
      <p class="sub">Digite o código enviado<br>após sua compra</p>
      <input class="token-input" id="tokenInput" type="text"
        placeholder="Seu código" maxlength="12" autocomplete="off" spellcheck="false">
      <button class="btn-access" id="btnAccess" onclick="handleAccess()">ACESSAR MINHA JORNADA</button>
      <p class="access-error" id="accessError">Código inválido. Verifique e tente novamente.</p>
      <p class="demo-hint">Protótipo · código de teste: <b>RESPIRE</b></p>
    </div>
  </div>

  <!-- ── HOME ── -->
  <div id="screen-home" class="screen"></div>

  <!-- ── DIA ── -->
  <div id="screen-day" class="screen"></div>

  <!-- ── PLANNER ── -->
  <div id="screen-planner" class="screen"></div>

  <!-- ── CONCLUSÃO ── -->
  <div id="screen-complete" class="screen"></div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════
   DADOS
══════════════════════════ */
const PHASES = [
  {id:1,label:'SEMANA 1',name:'O Detox Mental',sub:'Limpando o Terreno',emoji:'🌱',color:'p1'},
  {id:2,label:'SEMANA 2',name:'Reprogramação Mental',sub:'Assumindo o Comando',emoji:'⚡',color:'p2'},
  {id:3,label:'SEMANA 3',name:'Domínio e Prosperidade',sub:'Consolidando a Blindagem',emoji:'✨',color:'p3'}
];
const DAYS = [
  {id:1,semana:1,titulo:'Pausa Consciente',proposito:'Interromper o fluxo de reatividade e desligar o modo de sobrevivência do cérebro.',exemplo:'Você está em meio a e-mails urgentes e sente a respiração encurtar. Em vez de continuar, você para.',acao:'Escolha 3 momentos do dia para parar 1 minuto.\n\nRespire. Feche os olhos. Ouça seu corpo.\n\nPode ser antes do café, no banheiro ou no carro.',planner:'Registre seu estado emocional antes e depois da pausa.',quote:'A pausa é onde a clareza nasce.'},
  {id:2,semana:1,titulo:'Mapa da Mente',proposito:'Identificar os padrões de pensamento que drenam sua energia.',exemplo:'Você percebe que fica ruminando sobre o mesmo problema às 14h todos os dias.',acao:'Escreva sem filtro por 10 minutos.\n\nTudo que está na sua cabeça: medos, listas, preocupações.\n\nDepois, circule o que está em seu controle.',planner:'O que você descobriu sobre seus padrões de pensamento?',quote:'Nomear o medo é o primeiro passo para dissolvê-lo.'},
  {id:3,semana:1,titulo:'Âncora do Presente',proposito:'Treinar o cérebro para retornar ao momento atual quando a ansiedade chega.',exemplo:'Sua mente viaja para uma reunião de amanhã. Você usa os 5 sentidos para voltar ao agora.',acao:'Pratique o método 5-4-3-2-1:\n5 coisas que você vê\n4 que pode tocar\n3 que ouve\n2 que cheira\n1 que sente.\n\nRepita sempre que a ansiedade aparecer.',planner:'Em que situação você precisou usar sua âncora hoje?',quote:'O presente é o único lugar onde a vida acontece.'},
  {id:4,semana:1,titulo:'Desintoxicação Digital',proposito:'Reduzir o bombardeio de informações que mantém o sistema nervoso em alerta.',exemplo:'Você percebe que checa o celular 40x por hora sem motivo.',acao:'Estabeleça 3 janelas sem celular hoje (mínimo 30 min cada).\n\nDesative notificações de redes sociais.\n\nAntes de dormir: celular fora do quarto.',planner:'Como se sentiu nos momentos sem o celular?',quote:'Silêncio digital é luxo no século XXI.'},
  {id:5,semana:1,titulo:'Movimento Intencional',proposito:'Usar o corpo como ferramenta para regular o sistema nervoso.',exemplo:'Em vez de mais uma hora na cadeira, você faz 10 minutos de movimento consciente.',acao:'Escolha um movimento que traga prazer — caminhar, dançar, alongar.\n\nMínimo 20 minutos, com atenção plena no seu corpo.\n\nSem podcast. Só você e o movimento.',planner:'Que sensação o movimento trouxe para o seu dia?',quote:'O corpo guarda a conta do que a mente ignora.'},
  {id:6,semana:1,titulo:'Gratidão Estratégica',proposito:'Redirecionar o foco do cérebro do que falta para o que existe.',exemplo:'Você treina o cérebro a perceber evidências de abundância mesmo em dias difíceis.',acao:'Escreva 3 evidências de progresso de hoje — pequenas vitórias.\n\nDepois, 1 pessoa que você é grata por ter na vida e por quê.',planner:'Quais foram suas 3 evidências de progresso hoje?',quote:'A gratidão não nega a dor — ela expande a perspectiva.'},
  {id:7,semana:1,titulo:'Revisão da Semana',proposito:'Consolidar os aprendizados da primeira semana e celebrar cada avanço.',exemplo:'Você percebe que já respira diferente antes de reagir.',acao:'Reserve 20 minutos de silêncio.\n\nReleia suas anotações dos últimos 6 dias.\n\nResponda: O que mudou em mim esta semana?\n\nCelebre sem minimizar.',planner:'Qual foi a maior mudança que você percebeu em si esta semana?',quote:'Cada passo pequeno é uma revolução silenciosa.'},
  {id:8,semana:2,titulo:'Identidade Interna',proposito:'Separar quem você é de como você se sente — a base da estabilidade emocional.',exemplo:'Você sente ansiedade mas não é ansiosa. Você sente medo mas não é o medo.',acao:'Escreva 10 frases que começam com "Eu sou" — sem usar estados emocionais.\n\nFoco em valores, capacidades e características permanentes.',planner:'Quais afirmações mais ressoaram com quem você quer ser?',quote:'Você não é seus pensamentos. Você é quem os observa.'},

/* ══════════════════════════
   ESTADO
══════════════════════════ */
const DEF = {token:null,currentDay:1,completedDays:[],streak:0,lastOpened:null,startDate:null,plannerEntries:{}};
let S = {...DEF};
let activeDay = null;

function save(){ localStorage.setItem('rr3',JSON.stringify(S)); }
function load(){
  try { const r=localStorage.getItem('rr3'); if(r){S={...DEF,...JSON.parse(r)};return true;} } catch(e){}
  return false;
}
function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastOpened===today) return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  S.streak = S.lastOpened===yesterday ? (S.streak||0)+1 : (S.lastOpened ? 1 : (S.streak||1));
  S.lastOpened=today; save();
}

/* ══════════════════════════
   NAVEGAÇÃO
   Usa classes active / hidden-screen em vez de position:absolute
══════════════════════════ */
const ALL_SCREENS = ['access','home','day','planner','complete'];

function show(id){
  ALL_SCREENS.forEach(s=>{
    const el = document.getElementById('screen-'+s);
    if(!el) return;
    if(s===id){
      el.classList.add('active');
      el.classList.remove('hidden-screen');
    } else {
      el.classList.remove('active');
      el.classList.add('hidden-screen');
    }
    el.scrollTop=0;
  });
}

/* ══════════════════════════
   TOAST
══════════════════════════ */
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ══════════════════════════
   ACCESS
══════════════════════════ */
document.getElementById('tokenInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') handleAccess();
});

async function handleAccess(){
  const val = document.getElementById('tokenInput').value.trim().toUpperCase();
  const err = document.getElementById('accessError');
  const btn = document.getElementById('btnAccess');

  if(val.length < 6){
    err.textContent='Código precisa ter ao menos 6 caracteres.';
    err.style.display='block'; return;
  }

  btn.textContent='VERIFICANDO...'; btn.disabled=true; err.style.display='none';

  try {
    const res = await fetch('/api/validate-token',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token:val})
    });
    const data = await res.json();
    if(data.valid){
      S.token=val;
      if(!S.startDate) S.startDate=new Date().toISOString();
      updateStreak(); save(); renderHome(); show('home');
    } else {
      err.textContent='Código inválido. Verifique e tente novamente.';
      err.style.display='block';
      btn.textContent='ACESSAR MINHA JORNADA'; btn.disabled=false;
    }
  } catch(e){
    err.textContent='Erro de conexão. Tente novamente.';
    err.style.display='block';
    btn.textContent='ACESSAR MINHA JORNADA'; btn.disabled=false;
  }
}

/* ══════════════════════════
   HOME
══════════════════════════ */
function renderHome(){
  const done=S.completedDays.length, pct=Math.round(done/21*100);
  const el=document.getElementById('screen-home');
  const phasesHTML=PHASES.map(ph=>{
    const days=DAYS.filter(d=>d.semana===ph.id);
    const dHTML=days.map(d=>{
      const isDone=S.completedDays.includes(d.id);
      const isActive=d.id===S.currentDay;
      const isLocked=d.id>S.currentDay&&!isDone;
      let cls='day-card'+(isDone?' done':'')+(isActive?' active-day':'')+(isLocked?' locked':'');
      const click=isLocked?'':` onclick="openDay(${d.id})"`;
      return `<div class="${cls}"${click}>
        <div class="day-num">${isDone?'✓':d.id}</div>
        <div class="day-info">
          <div class="day-title">${d.titulo}</div>
          <div class="day-sub">${d.proposito.substring(0,52)}…</div>
        </div>
        <div class="day-check">${isDone?'🌿':isActive?'▶':isLocked?'🔒':''}</div>
      </div>`;
    }).join('');
    return `<div class="phase-section">
      <div class="phase-header">
        <span class="phase-emoji">${ph.emoji}</span>
        <span class="phase-name">${ph.label} · ${ph.name}</span>
        <span class="phase-sub">${ph.sub}</span>
      </div>${dHTML}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="home-header">
      <div class="home-header-top">
        <div class="home-greeting">Sua jornada<br><span>de 21 dias</span></div>
        <div class="streak-badge">
          <span class="num">${S.streak||1}</span>
          <span class="lbl">DIA${S.streak!==1?'S':''}</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done} de 21 completos · ${pct}%</div>
    </div>
    <div class="home-body">${phasesHTML}</div>`;
}

/* ══════════════════════════
   DIA
══════════════════════════ */
function openDay(id){ activeDay=DAYS.find(d=>d.id===id); renderDay(); show('day'); }

function renderDay(){
  const d=activeDay, ph=PHASES.find(p=>p.id===d.semana);
  const isDone=S.completedDays.includes(d.id);
  document.getElementById('screen-day').innerHTML=`
    <div class="day-hero ${ph.color}">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="day-hero-phase">${ph.label} · ${ph.name}</div>
      <div class="day-hero-num">DIA ${d.id}</div>
      <div class="day-hero-title">${d.titulo}</div>
      <div class="day-hero-divider"></div>
      <div class="day-hero-proposito">${d.proposito}</div>
    </div>
    <div class="day-body">
      <div class="day-section">
        <div class="day-section-label">✦ Exemplo do Dia</div>
        <div class="day-example">${d.exemplo}</div>
      </div>
      <div class="day-section">
        <div class="day-section-label">◆ Prática de Hoje</div>
        <div class="day-section-text">${d.acao}</div>
      </div>
    </div>
    <div class="day-actions">
      <button class="btn-outline" onclick="openPlanner()">📓 ABRIR PLANNER DO DIA</button>
      ${isDone
        ?`<button class="btn-primary" onclick="goHome()">✓ DIA CONCLUÍDO</button>`
        :`<button class="btn-primary" onclick="completeDay(${d.id})">CONCLUIR DIA ${d.id}</button>`}
    </div>`;
}

function goHome(){ renderHome(); show('home'); }

/* ══════════════════════════
   PLANNER
══════════════════════════ */
function openPlanner(){ renderPlanner(); show('planner'); }

function renderPlanner(){
  const d=activeDay, ph=PHASES.find(p=>p.id===d.semana), sv=S.plannerEntries[d.id]||{};
  const eHTML=['😊 Feliz','🌿 Calma','😰 Ansiosa','😴 Cansada'].map(e=>{
    const k=e.split(' ')[1].toLowerCase();
    return `<button class="emo-btn ${sv.emocao===k?'sel':''}" onclick="selectEmo('${k}',this)">${e}</button>`;
  }).join('');
  document.getElementById('screen-planner').innerHTML=`
    <div class="planner-hero">
      <button class="back-btn" onclick="backToDay()">←</button>
      <div class="planner-hero-title">Planner · Dia ${d.id}</div>
      <div class="planner-hero-sub">${ph.label} · ${d.titulo.toUpperCase()}</div>
      <div class="saved-badge" id="savedBadge">✓ Salvo</div>
    </div>
    <div class="planner-body">
      <div class="pcard">
        <div class="pcard-title">Como estou ao começar o dia?</div>
        <div class="emotion-grid">${eHTML}</div>
        <input class="pinput" id="pEmoCustom" type="text" placeholder="Ou descreva com suas palavras…" style="margin-top:8px" value="${sv.emocaoCustom||''}" oninput="autosave()">
      </div>
      <div class="pcard">
        <div class="pcard-title">✦ Intenção do Dia</div>
        <textarea class="pinput" id="pIntencao" rows="2" placeholder="Hoje eu vou…" oninput="autosave()">${sv.intencao||''}</textarea>
      </div>
      <div class="pcard">
        <div class="pcard-title">✅ 3 Prioridades Inegociáveis</div>
        ${[1,2,3].map(n=>`<div class="priority-row"><div class="pnum">${n}</div><input class="pinput" id="pPrio${n}" type="text" placeholder="Prioridade ${n}…" value="${sv['prio'+n]||''}" oninput="autosave()"></div>`).join('')}
      </div>
      <div class="pcard">
        <div class="pcard-title">💬 Reflexão do Dia</div>
        <div class="refl-q"><label class="refl-label">1. O que eu consegui hoje?</label><textarea class="pinput" id="pRefl1" rows="2" placeholder="Escreva livremente…" oninput="autosave()">${sv.refl1||''}</textarea></div>
        <div class="refl-q"><label class="refl-label">2. Como me senti ao longo do dia?</label><textarea class="pinput" id="pRefl2" rows="2" placeholder="Escreva livremente…" oninput="autosave()">${sv.refl2||''}</textarea></div>
        <div class="refl-q"><label class="refl-label">3. O que quero melhorar amanhã?</label><textarea class="pinput" id="pRefl3" rows="2" placeholder="Escreva livremente…" oninput="autosave()">${sv.refl3||''}</textarea></div>
      </div>
      <div class="pcard" style="background:var(--gold-pale);border:1px solid var(--gold-light)">
        <div class="pcard-title" style="color:#8A6830">📓 Reflexão · Dia ${d.id}</div>
        <p style="font-size:13px;color:#8A6830;line-height:1.6;margin-bottom:10px">${d.planner}</p>
        <textarea class="pinput" id="pDaySpec" rows="3" placeholder="Sua resposta…" oninput="autosave()" style="background:#fff">${sv.daySpec||''}</textarea>
      </div>
    </div>
    <div class="save-cta"><button class="btn-primary" onclick="savePlanner()">SALVAR PLANNER</button></div>`;
}

let _emoSel=null;
function selectEmo(k,btn){ document.querySelectorAll('.emo-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); _emoSel=k; autosave(); }
let _asT; function autosave(){ clearTimeout(_asT); _asT=setTimeout(savePlanner,800); }
function savePlanner(){
  if(!activeDay) return;
  const id=activeDay.id, sv=S.plannerEntries[id]||{};
  S.plannerEntries[id]={
    emocao:_emoSel||sv.emocao, emocaoCustom:document.getElementById('pEmoCustom')?.value||'',
    intencao:document.getElementById('pIntencao')?.value||'',
    prio1:document.getElementById('pPrio1')?.value||'', prio2:document.getElementById('pPrio2')?.value||'',
    prio3:document.getElementById('pPrio3')?.value||'', refl1:document.getElementById('pRefl1')?.value||'',
    refl2:document.getElementById('pRefl2')?.value||'', refl3:document.getElementById('pRefl3')?.value||'',
    daySpec:document.getElementById('pDaySpec')?.value||'', savedAt:new Date().toISOString()
  };
  save();
  const b=document.getElementById('savedBadge');
  if(b){b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);}
}
function backToDay(){ savePlanner(); renderDay(); show('day'); }

/* ══════════════════════════
   CONCLUSÃO
══════════════════════════ */
function completeDay(id){
  if(!S.completedDays.includes(id)) S.completedDays.push(id);
  if(id>=S.currentDay) S.currentDay=Math.min(id+1,21);
  updateStreak(); save();
  const d=DAYS.find(x=>x.id===id), isLast=id===21;
  document.getElementById('screen-complete').innerHTML=`
    <div class="complete-ring">✦</div>
    <div class="complete-day-label">DIA ${id} CONCLUÍDO</div>
    <div class="complete-title">${isLast?'Jornada<br>Completa':`Dia ${id}<br>Concluído`}</div>
    <p class="complete-quote">"${d.quote}"</p>
    <p class="complete-next">${isLast?'21 dias de clareza. Você chegou.':`Dia ${id+1} te espera amanhã 🌿`}</p>
    <button class="complete-btn" onclick="afterComplete()">${isLast?'VER MINHA JORNADA':'VOLTAR AO INÍCIO'}</button>`;
  show('complete');
}
function afterComplete(){ renderHome(); show('home'); }

/* ══════════════════════════
   BOOT
══════════════════════════ */
function boot(){
  if(load()&&S.token){ updateStreak(); renderHome(); show('home'); }
  else { show('access'); document.getElementById('tokenInput').focus(); }
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
